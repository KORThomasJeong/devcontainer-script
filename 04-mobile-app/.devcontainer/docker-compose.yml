version: '3.8'

services:
  app:
    image: mcr.microsoft.com/devcontainers/python:3.12
    volumes:
      - ../:/workspace:cached
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql+asyncpg://dev:devpassword@db:5432/mobiledb
    depends_on:
      - db
    network_mode: host

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: mobiledb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5404:5432"

volumes:
  postgres-data:
